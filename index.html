<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pro de Placas - Nada Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="interfaz-contenedor">
        
        <div class="panel-control">
            <h2>Panel de Control Pro</h2>
            
            <div class="campo">
                <label>Estilo de la Placa:</label>
                <select id="select-diseno">
                    <option value="deportivo">🔵 Diseño Deportivo / Noticias</option>
                    <option value="luto">🖤 Diseño Fúnebre / Luto</option>
                    <option value="municipal">🏛️ Diseño Municipalidad Sáenz Peña</option>
                </select>
            </div>

            <div class="campo">
                <label>Título de la Noticia:</label>
                <textarea id="input-titulo" placeholder="Escribí el título acá..."></textarea>
            </div>
            
            <div class="campo">
                <label>Categoría / Rango de Años:</label>
                <input type="text" id="input-categoria" placeholder="POLICIAL, DEPORTES o 1949 - 2026">
            </div>

            <div class="campo">
                <label>Dirección Web / Dominio:</label>
                <input type="text" id="input-dominio" value="www.nadadigital.com.ar" placeholder="ej: www.tusitio.com.ar">
            </div>

            <div class="campo">
                <label>Subir Logo (PNG Transparente):</label>
                <input type="file" id="input-logo" accept="image/*">
            </div>
            
            <div class="campo">
                <label>Imagen Destacada (Fondo):</label>
                <input type="file" id="input-foto" accept="image/*">
            </div>
            
            <div class="acciones-panel">
                <button type="button" class="btn-descarga-sp" onclick="descargarPlaca()">📥 Descargar Placa</button>
                <button type="button" class="btn-share-sp" onclick="compartirPlaca()">📤 Compartir en Celular</button>
            </div>
        </div>

        <div class="zona-placa">
            <div class="placa-sp-wrapper diseno-deportivo" id="placa-objetivo">
                
                <div class="img-noticia-sp" id="placa-foto" style="background-image: url('https://via.placeholder.com/800x1000/222/fff?text=Subir+Foto+de+Fondo');"></div>
                
                <div class="marca-agua-sp" id="placa-logo" style="background-image: url('https://nadadigital.com.ar/wp-content/uploads/2026/06/LOGONADADIGITAL-BLANCO.png');"></div>
                
                <div class="zocalo-sp">
                    <div class="cat-sp" id="placa-categoria">NOTICIAS</div>
                    <h2 class="titulo-sp" id="placa-titulo">Escribí un título en el panel izquierdo para empezar</h2>
                    <div class="footer-sp">
                        <span class="web-sp" id="placa-dominio">www.nadadigital.com.ar</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
